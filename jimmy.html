<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy John - Hegemon of Mars</title>
    <style>
        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            /* Using standard serif for maximum compatibility */
            font-family: "Times New Roman", Times, serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* First Page View */
        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .subtitle {
            color: #888888;
            font-size: 24px;
            margin-top: 0;
        }

        /* Second Page View (Mars) */
        .mars-image {
            width: 80%;
            max-width: 600px;
            height: auto;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .contact-link {
            color: #888888;
            text-decoration: none;
            font-size: 20px;
            font-style: italic;
            display: block;
        }

        .contact-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="section">
        <h1>jimmy john</h1>
        <div class="subtitle">hegemon of mars</div>
        <p style="color: #333; margin-top: 50px; font-size: 14px;">(scroll down)</p>
    </div>

    <div class="section">
        <img class="mars-image" 
             src="https://images-assets.nasa.gov/image/PIA04591/PIA04591~orig.jpg" 
             alt="Mars Landscape">
        
        <a class="contact-link" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
            contact the hegemon
        </a>
    </div>

</body>
</html>
